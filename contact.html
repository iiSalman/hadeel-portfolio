<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact · Hadeel Abdullah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0e0e0e;--surface:#161616;--border:#252525;--text:#EDE8E0;--muted:#666;--accent:#C4855A;--font-en:'Inter',sans-serif;--font-ar:'Tajawal',sans-serif;--font-serif:'Playfair Display',serif}
    html{scroll-behavior:smooth}
    body{font-family:var(--font-en);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    html[lang="ar"] body{font-family:var(--font-ar)}

    /* Nav */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:rgba(14,14,14,0.95);border-bottom:1px solid var(--border);flex-shrink:0}
    .nav-logo{font-family:var(--font-serif);font-size:1rem;font-weight:600;letter-spacing:0.12em;color:var(--text);text-decoration:none}
    html[lang="ar"] .nav-logo{font-family:var(--font-ar);letter-spacing:0}
    .nav-right{display:flex;align-items:center;gap:24px}
    .back-link{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color 0.2s}
    .back-link:hover{color:var(--text)}
    html[lang="ar"] .back-link{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}
    .back-link svg{width:14px;height:14px}
    html[dir="rtl"] .back-link svg{transform:scaleX(-1)}
    .lang-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:0.62rem;font-weight:500;letter-spacing:0.15em;color:var(--muted);cursor:pointer;transition:border-color 0.2s,color 0.2s}
    html[lang="ar"] .lang-toggle{font-family:var(--font-ar);letter-spacing:0;font-size:0.78rem}
    .lang-toggle:hover{border-color:var(--accent);color:var(--text)}
    .lang-toggle svg{width:12px;height:12px}

    /* Main layout */
    .contact-main{
      flex:1;
      display:grid;
      grid-template-columns:1fr 1fr;
      min-height:calc(100vh - 56px);
    }
    @media(max-width:720px){.contact-main{grid-template-columns:1fr}}

    /* Left — dark hero */
    .contact-left{
      position:relative;overflow:hidden;
      background:#0a0a0a;
      display:flex;flex-direction:column;justify-content:flex-end;
      padding:64px 56px;
    }
    .contact-left-bg{
      position:absolute;inset:0;
      background:url('hero/bg.png') center/cover no-repeat;
      opacity:0.12;filter:grayscale(100%);
    }
    .contact-left-content{position:relative;z-index:1}
    .contact-label{
      font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;
      color:var(--accent);margin-bottom:16px;
    }
    html[lang="ar"] .contact-label{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}
    .contact-heading{
      font-family:var(--font-serif);
      font-size:clamp(2.5rem,5vw,4.5rem);
      font-weight:600;line-height:1.1;
      color:var(--text);margin-bottom:24px;
    }
    html[lang="ar"] .contact-heading{font-family:var(--font-ar);letter-spacing:0;font-weight:700;line-height:1.3}
    .contact-sub{
      font-size:0.85rem;color:var(--muted);
      line-height:1.7;max-width:320px;
    }
    html[lang="ar"] .contact-sub{font-family:var(--font-ar);line-height:1.9;font-size:0.9rem}

    /* Right — cards */
    .contact-right{
      background:var(--surface);
      display:flex;flex-direction:column;justify-content:center;
      padding:64px 56px;gap:4px;
      border-left:1px solid var(--border);
    }
    html[dir="rtl"] .contact-right{border-left:none;border-right:1px solid var(--border)}
    @media(max-width:720px){.contact-right{padding:48px 32px;border-left:none;border-top:1px solid var(--border)}}

    .contact-card{
      display:flex;align-items:center;gap:20px;
      padding:24px 28px;
      background:var(--bg);
      border:1px solid var(--border);
      border-radius:4px;
      text-decoration:none;
      color:var(--text);
      transition:border-color 0.2s, transform 0.2s, background 0.2s;
      margin-bottom:12px;
    }
    .contact-card:last-child{margin-bottom:0}
    .contact-card:hover{border-color:var(--accent);transform:translateX(4px);background:#111}
    html[dir="rtl"] .contact-card:hover{transform:translateX(-4px)}

    .card-icon{
      width:44px;height:44px;border-radius:50%;
      background:var(--surface);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;transition:border-color 0.2s;
    }
    .contact-card:hover .card-icon{border-color:var(--accent)}
    .card-icon svg{width:18px;height:18px;color:var(--accent)}

    .card-body{flex:1;min-width:0}
    .card-platform{
      font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;
      color:var(--muted);margin-bottom:4px;
    }
    html[lang="ar"] .card-platform{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.72rem}
    .card-value{
      font-size:0.95rem;font-weight:500;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .card-action-icon{
      color:var(--muted);opacity:0;transform:translateX(-4px);
      transition:opacity 0.2s,transform 0.2s;flex-shrink:0;
    }
    html[dir="rtl"] .card-action-icon{transform:translateX(4px)}
    .contact-card:hover .card-action-icon{opacity:1;transform:translateX(0)}
    .card-action-icon svg{width:16px;height:16px}
    html[dir="rtl"] .card-action-icon svg{transform:scaleX(-1)}

    footer{text-align:center;padding:20px;border-top:1px solid var(--border);font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
    html[lang="ar"] footer{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.75rem}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo" id="nav-logo">HADEEL ABDULLAH</a>
    <div class="nav-right">
      <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        <span id="back-text">Back</span>
      </a>
      <button class="lang-toggle" id="lang-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span id="lang-toggle-label">عربي</span>
      </button>
    </div>
  </nav>

  <div class="contact-main">

    <!-- Left -->
    <div class="contact-left">
      <div class="contact-left-bg"></div>
      <div class="contact-left-content">
        <div class="contact-label" id="contact-label">Get in Touch</div>
        <h1 class="contact-heading" id="contact-heading">Let's work<br>together</h1>
        <p class="contact-sub" id="contact-sub">I'd love to hear about your next project — whether it's a home, a commercial space, or a special event.</p>
      </div>
    </div>

    <!-- Right — contact cards -->
    <div class="contact-right">

      <!-- WhatsApp -->
      <a class="contact-card" href="https://wa.me/966503109887" target="_blank" rel="noopener">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        </div>
        <div class="card-body">
          <div class="card-platform" id="wa-label">WhatsApp</div>
          <div class="card-value">+966 50 310 9887</div>
        </div>
        <div class="card-action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        </div>
      </a>

      <!-- Email -->
      <a class="contact-card" href="mailto:int.hadeelra@gmail.com" target="_blank" rel="noopener">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        </div>
        <div class="card-body">
          <div class="card-platform" id="email-label">Email</div>
          <div class="card-value">int.hadeelra@gmail.com</div>
        </div>
        <div class="card-action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        </div>
      </a>

      <!-- Instagram -->
      <a class="contact-card" href="https://instagram.com/int.hadeel" target="_blank" rel="noopener">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </div>
        <div class="card-body">
          <div class="card-platform" id="ig-label">Instagram</div>
          <div class="card-value">@int.hadeel</div>
        </div>
        <div class="card-action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
        </div>
      </a>

    </div>
  </div>

  <footer id="footer">© Hadeel Abdullah &nbsp;·&nbsp; All rights reserved</footer>

  <script>
    const ui = {
      en:{navLogo:'HADEEL ABDULLAH',backText:'Back',contactLabel:'Get in Touch',contactHeading:'Let\'s work<br>together',contactSub:"I'd love to hear about your next project — whether it's a home, a commercial space, or a special event.",waLabel:'WhatsApp',emailLabel:'Email',igLabel:'Instagram',footer:'© Hadeel Abdullah &nbsp;·&nbsp; All rights reserved',langToggle:'عربي'},
      ar:{navLogo:'هديل عبدالله',backText:'رجوع',contactLabel:'تواصلي معي',contactHeading:'لنعمل<br>معًا',contactSub:'يسعدني الاستماع إلى مشروعك القادم — سواء كان منزلاً أو مساحة تجارية أو فعالية مميزة.',waLabel:'واتساب',emailLabel:'البريد الإلكتروني',igLabel:'إنستغرام',footer:'© هديل عبدالله &nbsp;·&nbsp; جميع الحقوق محفوظة',langToggle:'English'}
    };
    let lang = localStorage.getItem('lang') || 'en';
    function applyLanguage(l) {
      lang = l;
      localStorage.setItem('lang', l);
      document.documentElement.setAttribute('lang', l);
      document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
      const s = ui[l];
      document.getElementById('nav-logo').textContent      = s.navLogo;
      document.getElementById('back-text').textContent     = s.backText;
      document.getElementById('contact-label').textContent = s.contactLabel;
      document.getElementById('contact-heading').innerHTML = s.contactHeading;
      document.getElementById('contact-sub').textContent   = s.contactSub;
      document.getElementById('wa-label').textContent      = s.waLabel;
      document.getElementById('email-label').textContent   = s.emailLabel;
      document.getElementById('ig-label').textContent      = s.igLabel;
      document.getElementById('footer').innerHTML          = s.footer;
      document.getElementById('lang-toggle-label').textContent = s.langToggle;
    }
    document.getElementById('lang-toggle').addEventListener('click', () => applyLanguage(lang === 'en' ? 'ar' : 'en'));
    applyLanguage(lang);
  </script>
</body>
</html>
