<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Contact · Hadeel Abdullah</title>
<script>
  (function(){
    var l = localStorage.getItem('lang') || 'en';
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0e0e0e;--surface:#161616;--border:#252525;--text:#EDE8E0;--muted:#666;--accent:#C4855A;--nav-bg:rgba(14,14,14,0.9);--font-en:'Inter',sans-serif;--font-ar:'Tajawal',sans-serif;--font-serif:'Playfair Display',serif}
  :root[data-theme="light"]{--bg:#EAE0CD;--surface:#D6C5A8;--border:#B8A07C;--text:#2C1F14;--muted:#7A6548;--accent:#9C4A1E;--nav-bg:rgba(234,224,205,0.95)}
  body{font-family:var(--font-en);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
  html[lang="ar"] body{font-family:var(--font-ar)}
  a{color:inherit;text-decoration:none}

  nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:var(--nav-bg);border-bottom:1px solid var(--border);flex-shrink:0;direction:ltr}
  .nav-logo{display:inline-flex;align-items:center;justify-content:center;width:34px;height:34px}
  .nav-logo-mark{display:block;width:32px;height:32px;background-color:var(--text);-webkit-mask:url("brand/logo-mark.png") center/contain no-repeat;mask:url("brand/logo-mark.png") center/contain no-repeat;animation:logo-spin 25s linear infinite;transform-origin:50% 50%}
  @keyframes logo-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){.nav-logo-mark{animation:none}}
  .nav-right{display:flex;align-items:center;gap:24px}
  .back-link{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;transition:color 0.2s}
  .back-link:hover{color:var(--text)}
  html[lang="ar"] .back-link{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}
  .back-link svg{width:14px;height:14px}
  html[dir="rtl"] .back-link svg{transform:scaleX(-1)}
  .lang-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:0.62rem;font-weight:500;letter-spacing:0.15em;color:var(--muted);cursor:pointer;transition:border-color 0.2s,color 0.2s;font-family:inherit}
  html[lang="ar"] .lang-toggle{font-family:var(--font-ar);letter-spacing:0;font-size:0.78rem}
  .lang-toggle:hover{border-color:var(--accent);color:var(--text)}
  .lang-toggle svg{width:12px;height:12px}
  .theme-toggle{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--border);border-radius:50%;color:var(--muted);cursor:pointer;transition:border-color 0.2s,color 0.2s;padding:0;font-family:inherit}
  .theme-toggle:hover{border-color:var(--accent);color:var(--text)}
  .theme-toggle svg{width:14px;height:14px}
  .theme-toggle .theme-icon-light{display:none}
  :root[data-theme="light"] .theme-toggle .theme-icon-dark{display:none}
  :root[data-theme="light"] .theme-toggle .theme-icon-light{display:block}

  .contact-main{flex:1;position:relative;overflow:hidden;min-height:calc(100vh - 56px)}
  .contact-bg{position:absolute;inset:0;background:url('hero/bg.png') center/cover no-repeat;filter:grayscale(100%) brightness(0.85)}
  .contact-scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(14,14,14,0.78) 0%,rgba(14,14,14,0.45) 50%,rgba(14,14,14,0.7) 100%)}
  :root[data-theme="light"] .contact-scrim{background:linear-gradient(90deg,rgba(14,14,14,0.68) 0%,rgba(14,14,14,0.42) 50%,rgba(14,14,14,0.62) 100%)}
  .contact-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:80px 64px;min-height:calc(100vh - 56px)}
  @media(max-width:720px){.contact-inner{grid-template-columns:1fr;padding:48px 24px;gap:32px}}

  .contact-left{position:relative;display:flex;flex-direction:column;justify-content:center}
  .contact-label{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:#C4855A;margin-bottom:16px;text-shadow:0 1px 8px rgba(0,0,0,0.5)}
  html[lang="ar"] .contact-label{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}
  .contact-heading{font-family:var(--font-serif);font-size:clamp(2.5rem,5vw,4.5rem);font-weight:600;line-height:1.1;color:#EDE8E0;margin-bottom:24px;text-shadow:0 2px 24px rgba(0,0,0,0.55)}
  html[lang="ar"] .contact-heading{font-family:var(--font-ar);letter-spacing:0;font-weight:700;line-height:1.3}
  .contact-sub{font-size:0.85rem;color:rgba(237,232,224,0.85);line-height:1.7;max-width:340px;text-shadow:0 1px 12px rgba(0,0,0,0.6)}
  html[lang="ar"] .contact-sub{font-family:var(--font-ar);line-height:1.9;font-size:0.9rem}

  .contact-right{
    display:flex;flex-direction:column;justify-content:center;gap:10px;
    background:rgba(237,232,224,0.08);
    border:1px solid rgba(237,232,224,0.18);
    border-radius:10px;
    padding:32px;
    backdrop-filter:blur(20px) saturate(1.1);
    -webkit-backdrop-filter:blur(20px) saturate(1.1);
    box-shadow:0 20px 60px rgba(0,0,0,0.35);
  }
  :root[data-theme="light"] .contact-right{
    background:rgba(244,237,224,0.14);
    border-color:rgba(244,237,224,0.28);
  }
  @media(max-width:720px){.contact-right{padding:24px}}

  .contact-card{display:flex;align-items:center;gap:20px;padding:20px 24px;background:rgba(14,14,14,0.55);border:1px solid rgba(237,232,224,0.12);border-radius:6px;color:#EDE8E0;transition:border-color 0.2s,transform 0.2s,background 0.2s}
  .contact-card:hover{border-color:var(--accent);transform:translateX(4px);background:rgba(14,14,14,0.75)}
  html[dir="rtl"] .contact-card:hover{transform:translateX(-4px)}

  .card-icon{width:44px;height:44px;border-radius:50%;background:rgba(237,232,224,0.06);border:1px solid rgba(237,232,224,0.16);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color 0.2s}
  .contact-card:hover .card-icon{border-color:var(--accent)}
  .card-icon svg{width:18px;height:18px;color:var(--accent)}

  .card-body{flex:1;min-width:0}
  .card-platform{font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:rgba(237,232,224,0.65);margin-bottom:4px}
  html[lang="ar"] .card-platform{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.72rem}
  .card-value{font-size:0.95rem;font-weight:500;color:#EDE8E0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:ltr;unicode-bidi:isolate}
  html[dir="rtl"] .card-value{text-align:right}
  .card-action-icon{color:rgba(237,232,224,0.55);opacity:0;transform:translateX(-4px);transition:opacity 0.2s,transform 0.2s;flex-shrink:0}
  html[dir="rtl"] .card-action-icon{transform:translateX(4px)}
  .contact-card:hover .card-action-icon{opacity:1;transform:translateX(0)}
  .card-action-icon svg{width:16px;height:16px}
  html[dir="rtl"] .card-action-icon svg{transform:scaleX(-1)}

  footer{text-align:center;padding:20px;border-top:1px solid var(--border);font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);flex-shrink:0}
  html[lang="ar"] footer{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.75rem}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" id="nav-logo" aria-label="Hadeel Abdullah — home"><span class="nav-logo-mark" aria-hidden="true"></span></a>
  <div class="nav-right">
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      <span id="back-text">Back</span>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
    <button class="lang-toggle" id="lang-toggle" aria-label="Toggle language">

      <span id="lang-toggle-label">عربي</span>
    </button>
  </div>
</nav>

<footer id="footer">© Hadeel Abdullah &nbsp;·&nbsp; All rights reserved</footer>

<script>
  const ui = {
    en:{navLogo:'HADEEL ABDULLAH',backText:'Back',contactLabel:'Get in Touch',contactHeading:"Let's work<br>together",contactSub:"I'd love to hear about your next project — whether it's a home, a commercial space, or a special event.",waLabel:'WhatsApp',emailLabel:'Email',igLabel:'Instagram',footer:'© Hadeel Abdullah &nbsp;·&nbsp; All rights reserved',langToggle:'عربي'},
    ar:{navLogo:'هديل عبدالله',backText:'رجوع',contactLabel:'تواصل معي',contactHeading:'لنعمل<br>معًا',contactSub:'يسعدني الاستماع إلى مشروعك القادم — سواء كان منزلاً أو مساحة تجارية أو فعالية مميزة.',waLabel:'واتساب',emailLabel:'البريد الإلكتروني',igLabel:'إنستغرام',footer:'© هديل عبدالله &nbsp;·&nbsp; جميع الحقوق محفوظة',langToggle:'English'}
  };
  let lang = localStorage.getItem('lang') || 'en';
  function applyLanguage(l){
    lang = l;
    localStorage.setItem('lang', l);
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    const s = ui[l];
    document.getElementById('nav-logo').setAttribute('aria-label', s.navLogo);
    document.getElementById('back-text').textContent      = s.backText;
    document.getElementById('contact-label').textContent  = s.contactLabel;
    document.getElementById('contact-heading').innerHTML  = s.contactHeading;
    document.getElementById('contact-sub').textContent    = s.contactSub;
    document.getElementById('wa-label').textContent       = s.waLabel;
    document.getElementById('email-label').textContent    = s.emailLabel;
    document.getElementById('ig-label').textContent       = s.igLabel;
    document.getElementById('footer').innerHTML           = s.footer;
    document.getElementById('lang-toggle-label').textContent = s.langToggle;
  }
  document.getElementById('lang-toggle').addEventListener('click', () => applyLanguage(lang === 'en' ? 'ar' : 'en'));
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
  applyLanguage(lang);
</script>
</body>
</html>
