<script>
  (function(){
    var l = localStorage.getItem('lang') || 'en';
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    var t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0e0e0e;--surface:#161616;--border:#252525;--text:#EDE8E0;--muted:#666;--accent:#C4855A;--nav-bg:rgba(14,14,14,0.9);--font-en:'Inter',sans-serif;--font-ar:'Tajawal',sans-serif;--font-serif:'Playfair Display',serif}
  :root[data-theme="light"]{--bg:#EAE0CD;--surface:#D6C5A8;--border:#B8A07C;--text:#2C1F14;--muted:#7A6548;--accent:#9C4A1E;--nav-bg:rgba(234,224,205,0.95)}
  body{font-family:var(--font-en);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
  html[lang="ar"] body{font-family:var(--font-ar)}
  a{color:inherit;text-decoration:none}
  img{display:block}

  /* NAV — LTR-locked */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:56px;background:var(--nav-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);direction:ltr}
  .nav-logo{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px}
  .nav-logo-mark{display:block;width:40px;height:40px;background-color:var(--text);-webkit-mask:url("brand/logo-mark.png") center/contain no-repeat;mask:url("brand/logo-mark.png") center/contain no-repeat;animation:logo-spin 25s linear infinite;transform-origin:50% 50%;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.35))}
  :root[data-theme="light"] .nav-logo-mark{filter:drop-shadow(0 1px 2px rgba(0,0,0,0.15))}
  @keyframes logo-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){.nav-logo-mark{animation:none}}
  .nav-right{display:flex;align-items:center;gap:24px}
  .back-link{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:6px;transition:color 0.2s}
  .back-link:hover{color:var(--text)}
  html[lang="ar"] .back-link{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}
  .back-link svg{width:14px;height:14px}
  html[dir="rtl"] .back-link svg{transform:scaleX(-1)}
  .lang-toggle{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:0.62rem;font-weight:500;letter-spacing:0.15em;color:var(--muted);cursor:pointer;transition:border-color 0.2s,color 0.2s;font-family:inherit}
  html[lang="ar"] .lang-toggle{font-family:var(--font-ar);letter-spacing:0;font-size:0.78rem}
  .lang-toggle:hover{border-color:var(--accent);color:var(--text)}
  .lang-toggle svg{width:12px;height:12px}
  .theme-toggle{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid var(--border);border-radius:50%;color:var(--muted);cursor:pointer;transition:border-color 0.2s,color 0.2s;padding:0;font-family:inherit}
  .theme-toggle:hover{border-color:var(--accent);color:var(--text)}
  .theme-toggle svg{width:14px;height:14px}
  .theme-toggle .theme-icon-light{display:none}
  :root[data-theme="light"] .theme-toggle .theme-icon-dark{display:none}
  :root[data-theme="light"] .theme-toggle .theme-icon-light{display:block}

  /* INFO BAR */
  .project-head{position:relative;overflow:hidden;isolation:isolate;padding:104px 40px 64px;border-bottom:1px solid var(--border);text-align:center;min-height:360px;display:flex;flex-direction:column;justify-content:center}
  .project-head-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:grayscale(100%) brightness(0.55) contrast(1.1);opacity:0.22;z-index:0;pointer-events:none}
  :root[data-theme="light"] .project-head-photo{filter:sepia(0.28) saturate(0.75) brightness(1.02) contrast(0.94);opacity:0.38}
  .project-head-photo-fade{position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,0) 0%,var(--bg) 100%),linear-gradient(90deg,var(--bg) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,0) 74%,var(--bg) 100%)}
  .project-head-bg{position:absolute;inset:0;width:100%;height:100%;color:var(--accent);opacity:0.14;pointer-events:none;z-index:2;stroke:currentColor;fill:none;stroke-width:1;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="light"] .project-head-bg{opacity:0.22}
  .project-head-label,.project-title,.info-bar{position:relative;z-index:3}
  @media(max-width:680px){.project-head-bg{opacity:0.08}.project-head{padding:88px 24px 48px;min-height:300px}}
  .project-head-label{display:none}
  html[lang="ar"] .project-head-label{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}
  .project-title{font-family:var(--font-serif);font-size:clamp(2.2rem,5vw,4rem);font-weight:600;letter-spacing:0.02em;line-height:1.05;margin-bottom:16px;text-align:center}
  html[lang="ar"] .project-title{font-family:var(--font-ar);letter-spacing:0;font-weight:700}
  .info-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:28px;color:var(--muted);font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;margin-top:8px}
  html[lang="ar"] .info-bar{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.85rem}
  .info-bar > div span{color:var(--text);margin-inline-start:8px;letter-spacing:0.04em}

  /* HERO */
  .project-hero{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--surface)}
  .project-hero img{width:100%;height:100%;object-fit:cover;filter:brightness(0.92)}

  /* SECTIONS */
  .section-block{padding:48px 40px 40px}
  .section-head-wrap{position:relative;overflow:hidden;isolation:isolate;padding:56px 0 40px;margin:0 -40px 32px;border-bottom:1px solid var(--border)}
  .section-head-bg{position:absolute;inset:0;width:100%;height:100%;color:var(--accent);opacity:0.12;pointer-events:none;z-index:0;stroke:currentColor;fill:none;stroke-width:1;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="light"] .section-head-bg{opacity:0.20}
  @media(max-width:680px){.section-head-bg{opacity:0.07}}
  .section-label{font-size:0.62rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--accent);margin-bottom:6px}
  html[lang="ar"] .section-label{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.82rem}
  .section-heading{position:relative;z-index:1;font-family:var(--font-serif);font-size:clamp(1.4rem,2.6vw,2rem);font-weight:600;margin-bottom:0;text-align:center}
  html[lang="ar"] .section-heading{font-family:var(--font-ar);font-weight:700}
  .gallery{display:flex;flex-wrap:wrap;gap:4px}
  .gallery-item{position:relative;overflow:hidden;cursor:zoom-in;background:var(--surface);flex:0 0 auto}
  .gallery-item img{width:100%;height:100%;display:block;object-fit:cover;transition:transform 0.5s ease,filter 0.3s}
  .gallery-item:hover img{transform:scale(1.03);filter:brightness(1.05)}
  .gallery-item.contain{background:#fff}
  .gallery-item.contain img{object-fit:contain;padding:16px}
  /* Full-width variant — single image spans edge to edge, natural aspect ratio */
  .gallery.full{display:block}
  .gallery.full .gallery-item{width:100%!important;height:auto!important;background:transparent}
  .gallery.full .gallery-item img{height:auto;transform:none!important;filter:none!important}
  .gallery.full .gallery-item:hover img{transform:none;filter:none}
  /* Decorative interior-sketch filler for the trailing row's empty space */
  .gallery-filler{position:relative;overflow:hidden;flex:0 0 auto;display:none;background:var(--surface);align-items:center;justify-content:center;padding:20px}
  .gallery-filler svg{width:100%;height:100%;color:var(--accent);opacity:0.45;stroke:currentColor;fill:none;stroke-width:1;stroke-linecap:round;stroke-linejoin:round}
  :root[data-theme="light"] .gallery-filler svg{opacity:0.60}
  .gallery.full .gallery-filler{display:none!important}

  /* DESCRIPTION */
  .description-block{padding:48px 40px 80px;max-width:860px;margin:0 auto}
  .description-text{font-family:var(--font-serif);font-style:italic;font-size:clamp(1rem,1.6vw,1.15rem);line-height:1.9;color:rgba(237,232,224,0.82)}
  :root[data-theme="light"] .description-text{color:rgba(44,31,20,0.78)}
  html[lang="ar"] .description-text{font-family:var(--font-ar);font-style:normal;line-height:2;text-align:right}

  /* FOOTER */
  footer{text-align:center;padding:24px;border-top:1px solid var(--border);font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
  html[lang="ar"] footer{font-family:var(--font-ar);letter-spacing:0;text-transform:none;font-size:0.78rem}

  /* LIGHTBOX */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:1000;display:none;align-items:center;justify-content:center;direction:ltr}
  .lb.open{display:flex}
  .lb-img{max-width:92vw;max-height:86vh;object-fit:contain}
  .lb-btn{position:absolute;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.2s,border-color 0.2s}
  .lb-btn:hover{background:rgba(255,255,255,0.14);border-color:var(--accent)}
  .lb-btn svg{width:22px;height:22px}
  .lb-prev{left:24px}.lb-next{right:24px}
  .lb-close{position:absolute;top:20px;right:24px;width:40px;height:40px;top:20px}
  .lb-counter{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:0.7rem;letter-spacing:0.2em}
</style>
</head>
<body>

<script>
  // ── Project data ────────────────────────────────────────────────
  const project = {
    title: { en:'ALMAMLAKA', ar:'المملكة' },
    year: '2026',
    location: { en:'Riyadh', ar:'الرياض' },
    type: { en:'Commercial', ar:'تجاري' },
    hero: '1. ALMAMLAKA/3d shots/b.jpg',
    description: {
      en: 'Project details coming soon.',
      ar: 'تفاصيل المشروع قادمة قريباً.'
    },
    sections: [
      { label:{en:'2D Drawings',  ar:'الرسومات ثنائية الأبعاد'}, fullWidth:true, images:[
        '1. ALMAMLAKA/2D Drawing/2d-transparent.png',
      ]},
      { label:{en:'3D Shots',     ar:'اللقطات ثلاثية الأبعاد'}, images:[
        '1. ALMAMLAKA/3d shots/13.jpg',
        '1. ALMAMLAKA/3d shots/15.jpg',
        '1. ALMAMLAKA/3d shots/18.jpg',
        '1. ALMAMLAKA/3d shots/b.jpg',
        '1. ALMAMLAKA/3d shots/c.jpg',
        '1. ALMAMLAKA/3d shots/h.jpg',
      ]},
      { label:{en:'Final Outcome', ar:'النتيجة النهائية'}, images:[
        '1. ALMAMLAKA/FINAL OUTCOME/تصميم بدون عنوان - 1.png',
        '1. ALMAMLAKA/FINAL OUTCOME/0E0027D3-1F7F-4332-A8DD-B79428BC8988.jpg',
        '1. ALMAMLAKA/FINAL OUTCOME/IMG_2829.jpg',
      ]},
    ],
  };

  // ── i18n ────────────────────────────────────────────────────────
  const ui = {
    en:{ navLogo:'HADEEL ABDULLAH', backText:'Back', headLabel:'Project', yearLabel:'Year', locLabel:'Location', typeLabel:'Type', footer:'© Hadeel Abdullah &nbsp;·&nbsp; All rights reserved', langToggle:'عربي' },
    ar:{ navLogo:'هديل عبدالله', backText:'رجوع', headLabel:'مشروع', yearLabel:'السنة', locLabel:'الموقع', typeLabel:'النوع', footer:'© هديل عبدالله &nbsp;·&nbsp; جميع الحقوق محفوظة', langToggle:'English' },
  };

  let lang = localStorage.getItem('lang') || 'en';
  const encode = (p) => p.split('/').map(encodeURIComponent).join('/');

  function renderSections(){
    const wrap = document.getElementById('sections-wrap');
    wrap.innerHTML = '';
    project.sections.forEach((sec, si) => {
      const block = document.createElement('section');
      block.className = 'section-block';
      const headWrap = document.createElement('div');
      headWrap.className = 'section-head-wrap';
      headWrap.innerHTML = '<svg class="section-head-bg" viewBox="0 0 1400 180" preserveAspectRatio="xMidYMid slice" aria-hidden="true">'
        + '<g transform="translate(60,40)">'
        + '<line x1="0" y1="50" x2="360" y2="50"/>'
        + '<line x1="0" y1="40" x2="0" y2="60"/>'
        + '<line x1="120" y1="44" x2="120" y2="56"/>'
        + '<line x1="240" y1="44" x2="240" y2="56"/>'
        + '<line x1="360" y1="40" x2="360" y2="60"/>'
        + '<path d="M 0 50 L 12 46 L 12 54 Z" fill="currentColor" stroke="none"/>'
        + '<path d="M 360 50 L 348 46 L 348 54 Z" fill="currentColor" stroke="none"/>'
        + '</g>'
        + '<g transform="translate(970,30)">'
        + '<rect x="0" y="0" width="340" height="110" stroke-width="1.5"/>'
        + '<line x1="140" y1="0" x2="140" y2="110"/>'
        + '<line x1="0" y1="60" x2="140" y2="60"/>'
        + '<rect x="20" y="15" width="40" height="30" rx="2"/>'
        + '<circle cx="100" cy="30" r="12"/>'
        + '<rect x="160" y="20" width="160" height="40" rx="2"/>'
        + '<rect x="160" y="70" width="160" height="30" stroke-dasharray="3 3"/>'
        + '</g>'
        + '</svg>';
      const heading = document.createElement('h2');
      heading.className = 'section-heading';
      heading.textContent = sec.label[lang];
      headWrap.appendChild(heading);
      const gallery = document.createElement('div');
      gallery.className = 'gallery' + (sec.fullWidth ? ' full' : '');
      sec.images.forEach(src => {
        const item = document.createElement('div');
        item.className = 'gallery-item' + (sec.contain ? ' contain' : '');
        item.dataset.src = src;
        const img = document.createElement('img');
        img.src = encode(src);
        img.alt = sec.label[lang];
        item.appendChild(img);
        item.addEventListener('click', () => openLightbox(src));
        gallery.appendChild(item);
      });
      if (!sec.fullWidth){
        const filler = document.createElement('div');
        filler.className = 'gallery-filler';
        filler.setAttribute('aria-hidden', 'true');
        filler.innerHTML = INTERIOR_SKETCH_SVG;
        gallery.appendChild(filler);
      }
      block.appendChild(headWrap);
      block.appendChild(gallery);
      wrap.appendChild(block);
      layoutGallery(gallery);
    });
  }

  // Inline 1-point perspective interior sketch — sofa, floor lamp, potted plant,
  // window on back wall. Stroke uses currentColor so it tints bronze/terracotta.
  const INTERIOR_SKETCH_SVG = `<svg viewBox="0 0 480 480" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
    <rect x="140" y="140" width="200" height="170"/>
    <line x1="40"  y1="60"  x2="140" y2="140"/>
    <line x1="440" y1="60"  x2="340" y2="140"/>
    <line x1="40"  y1="420" x2="140" y2="310"/>
    <line x1="440" y1="420" x2="340" y2="310"/>
    <rect x="40" y="60" width="400" height="360" opacity="0.55"/>
    <rect x="180" y="180" width="120" height="80"/>
    <line x1="240" y1="180" x2="240" y2="260"/>

  // ── Justified-rows layout ───────────────────────────────────────
  const TARGET_ROW_H = 360;
  const ROW_GAP      = 4;
  const MAX_SCALE    = 1.3;

  async function layoutGallery(gallery){
    if (gallery.classList.contains('full')) return;
    const items = [...gallery.querySelectorAll('.gallery-item')];
    if (!items.length) return;
    await Promise.all(items.map(it => {
      const img = it.querySelector('img');
      if (img.complete && img.naturalWidth) return Promise.resolve();
      return img.decode().catch(() => new Promise(r => img.addEventListener('load', r, { once:true })));
    }));
    const ratios = items.map(it => {
      const img = it.querySelector('img');
      return (img.naturalWidth || 4) / (img.naturalHeight || 3);
    });
    const containerW = gallery.clientWidth;
    let row = [], rowRatioSum = 0;
    const rows = [];
    for (let i = 0; i < items.length; i++){
      row.push(i);
      rowRatioSum += ratios[i];
      const rowW = rowRatioSum * TARGET_ROW_H + ROW_GAP * (row.length - 1);
      if (rowW >= containerW){
        rows.push({ idxs: row, ratioSum: rowRatioSum, justify: true });
        row = []; rowRatioSum = 0;
      }
    }
    if (row.length) rows.push({ idxs: row, ratioSum: rowRatioSum, justify: false });
    let lastRowH = 0, lastRowUsedW = 0, lastRowJustify = true;
    for (const r of rows){
      const gaps = ROW_GAP * (r.idxs.length - 1);
      const needed = (containerW - gaps) / r.ratioSum;
      const h = r.justify ? needed : Math.min(needed, TARGET_ROW_H * MAX_SCALE);
      for (const i of r.idxs){
        items[i].style.width  = (h * ratios[i]) + 'px';
        items[i].style.height = h + 'px';
      }
      lastRowH = h;
      lastRowUsedW = r.idxs.reduce((a,i) => a + h * ratios[i], 0) + gaps;
      lastRowJustify = r.justify;
    }

    // Size the decorative filler into the empty tail of the last row.
    const filler = gallery.querySelector('.gallery-filler');
    if (filler){
      const remaining = containerW - lastRowUsedW - ROW_GAP;
      if (!lastRowJustify && remaining > 120){
        filler.style.display = 'flex';
        filler.style.width   = remaining + 'px';
        filler.style.height  = lastRowH + 'px';
      } else {
        filler.style.display = 'none';
      }
    }
  }

  const debounce = (fn, ms) => { let t; return () => { clearTimeout(t); t = setTimeout(fn, ms); }; };
  const relayoutAll = () => document.querySelectorAll('.gallery').forEach(layoutGallery);
  window.addEventListener('resize', debounce(relayoutAll, 120));

  function applyLanguage(l){
    lang = l;
    localStorage.setItem('lang', l);
    document.documentElement.setAttribute('lang', l);
    document.documentElement.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    document.getElementById('nav-logo').setAttribute('aria-label', ui[l].navLogo);
    document.getElementById('back-text').textContent   = ui[l].backText;
    document.getElementById('head-label').textContent  = ui[l].headLabel;
    document.getElementById('project-title').textContent = project.title[l];
    document.getElementById('info-year-label').textContent = ui[l].yearLabel;
    document.getElementById('info-loc-label').textContent  = ui[l].locLabel;
    document.getElementById('info-type-label').textContent = ui[l].typeLabel;
    document.getElementById('info-year').textContent = project.year;
    document.getElementById('info-loc').textContent  = project.location[l];
    document.getElementById('info-type').textContent = project.type[l];
    document.getElementById('description').textContent = project.description[l];
    document.getElementById('footer').innerHTML       = ui[l].footer;
    document.getElementById('lang-toggle-label').textContent = ui[l].langToggle;
    document.getElementById('hero-img').src = encode(project.hero);
    document.getElementById('head-photo').src = encode(project.hero);
    document.getElementById('hero-img').alt = project.title[l];
    document.title = project.title.en + ' · Hadeel Abdullah';
    renderSections();
  }

  document.getElementById('lang-toggle').addEventListener('click', () => applyLanguage(lang === 'en' ? 'ar' : 'en'));
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });

  // ── LIGHTBOX ────────────────────────────────────────────────────
  const allImages = project.sections.flatMap(s => s.images);
  let lbIdx = 0;
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lb-img');
  const lbCounter = document.getElementById('lb-counter');

  function openLightbox(src){
    lbIdx = allImages.indexOf(src);
    if (lbIdx < 0) lbIdx = 0;
    showLb();
    lb.classList.add('open');
    lb.setAttribute('aria-hidden','false');
  }
  function closeLightbox(){
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden','true');
  }
  function showLb(){
    const src = allImages[lbIdx];
    lbImg.src = encode(src);
    lbCounter.textContent = (lbIdx+1) + ' / ' + allImages.length;
  }
  function next(){ lbIdx = (lbIdx+1) % allImages.length; showLb(); }
  function prev(){ lbIdx = (lbIdx-1+allImages.length) % allImages.length; showLb(); }
  document.getElementById('lb-next').addEventListener('click', next);
  document.getElementById('lb-prev').addEventListener('click', prev);
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft') prev();
  });

  applyLanguage(lang);
</script>
